<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post — LINESBYLIN</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .post-hero {
      width: 100%;
      max-height: 420px;
      object-fit: cover;
      display: block;
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-lg);
      box-shadow: var(--shadow-medium);
    }

    .post-wrapper {
      max-width: 760px;
      margin: 0 auto;
      padding: var(--space-xl) var(--space-md);
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-md);
      flex-wrap: wrap;
    }

    .post-category-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--soft-blue);
      color: var(--forest-green);
      font-family: var(--font-body);
      font-weight: var(--font-semibold);
      font-size: var(--text-sm);
      padding: 4px 12px;
      border-radius: var(--radius-lg);
      border: var(--border-width) solid var(--warm-beige);
    }

    .post-date {
      font-size: var(--text-sm);
      color: var(--text-muted);
      font-family: var(--font-body);
    }

    .post-title {
      font-family: var(--font-heading);
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.2;
      color: var(--text-primary);
      margin-bottom: var(--space-lg);
    }

    .post-divider {
      border: none;
      border-top: var(--border-width) solid var(--warm-beige);
      margin: var(--space-lg) 0;
    }

    .post-body {
      font-family: var(--font-body);
      font-size: var(--text-lg);
      line-height: 1.85;
      color: var(--text-primary);
    }

    .post-body.poem-style {
      font-family: var(--font-heading);
      font-style: italic;
      text-align: center;
    }

    .post-body.poem-style .poem-stanza {
      margin-bottom: var(--space-lg);
    }

    .post-body.poem-style .poem-stanza p {
      margin: 0;
      line-height: 1.9;
    }

    .post-body.poem-style .poem-stanza p:empty {
      height: 0.8em;
      display: block;
    }

    .post-body p { margin-bottom: var(--space-md); }
    .post-body h2 { margin: var(--space-lg) 0 var(--space-sm); }
    .post-body h3 { margin: var(--space-md) 0 var(--space-xs); }
    .post-body blockquote {
      border-left: 4px solid var(--forest-green);
      padding: var(--space-sm) var(--space-md);
      margin: var(--space-md) 0;
      background: var(--soft-blue);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      font-style: italic;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-body);
      font-weight: var(--font-semibold);
      font-size: var(--text-sm);
      color: var(--forest-green);
      margin-bottom: var(--space-lg);
      padding: 6px 14px;
      border-radius: var(--radius-lg);
      border: var(--border-width) solid var(--warm-beige);
      background: var(--bg-surface);
      transition: all var(--transition-fast);
    }
    .back-link:hover {
      background: var(--warm-beige);
      color: var(--dark-moss);
      transform: translateX(-2px);
    }

    .post-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 40vh;
      gap: var(--space-md);
      color: var(--text-muted);
      font-family: var(--font-body);
    }

    .post-not-found {
      text-align: center;
      padding: var(--space-xl);
      color: var(--text-muted);
      font-family: var(--font-heading);
      font-size: var(--text-2xl);
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <img src="assets/icons/logo.svg" class="nav-icon" alt="" style="width: 50px; height: 50px;"> LINESBYLIN
      </a>
      <ul class="nav-menu" id="nav-menu">
        <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
        <li class="nav-item"><a href="index.html#about" class="nav-link">About</a></li>
        <li class="nav-item dropdown">
          <a href="#" class="nav-link dropdown-toggle active">
            <img src="assets/icons/work.svg" class="nav-icon" alt=""> Work
          </a>
          <div class="dropdown-menu">
            <a href="blog.html" class="dropdown-item">
              <img src="assets/icons/blog.svg" class="nav-icon" alt=""> Blog
            </a>
            <a href="poems.html" class="dropdown-item">
              <img src="assets/icons/poem.svg" class="nav-icon" alt=""> Poems
            </a>
            <a href="stories.html" class="dropdown-item">
              <img src="assets/icons/story.svg" class="nav-icon" alt=""> Stories
            </a>
          </div>
        </li>
        <li class="nav-item dropdown">
          <a href="#" class="nav-link dropdown-toggle">
            <img src="assets/icons/media.svg" class="nav-icon" alt=""> MediaHub
          </a>
          <div class="dropdown-menu">
            <a href="beats.html" class="dropdown-item">
              <img src="assets/icons/music.svg" class="nav-icon" alt=""> Beats
            </a>
            <a href="movies.html" class="dropdown-item">
              <img src="assets/icons/movie.svg" class="nav-icon" alt=""> Movies
            </a>
            <a href="tvshows.html" class="dropdown-item">
              <img src="assets/icons/tv.svg" class="nav-icon" alt=""> Shows
            </a>
          </div>
        </li>
        <li class="nav-item"><a href="dream-map.html" class="nav-link">Dreams</a></li>
        <li class="nav-item"><a href="index.html#contact" class="nav-link">Contact</a></li>
      </ul>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="post-wrapper">
    <div id="post-container">
      <div class="post-loading">
        <div class="loading-spinner"></div>
        <p>Loading post…</p>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-content">
      <span class="footer-logo">LINESBYLIN</span>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="mediahub.html">MediaHub</a>
      </div>
    </div>
  </footer>

  <div class="progress-wrap" id="progressWrap">
    <svg class="progress-circle svg-content" width="100%" height="100%" viewBox="-1 -1 102 102">
      <path d="M50,1 a49,49 0 0,1 0,98 a49,49 0 0,1 0,-98"/>
    </svg>
    <span class="progress-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"></line>
        <polyline points="5 12 12 5 19 12"></polyline>
      </svg>
    </span>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/main.js"></script>
  <script>
    const catIcons = { blog: 'assets/icons/blog.svg', poem: 'assets/icons/poem.svg', story: 'assets/icons/story.svg' };
    const catNames  = { blog: 'Blog', poem: 'Poem', story: 'Story' };
    const catPages  = { blog: 'blog.html', poem: 'poems.html', story: 'stories.html' };

    async function loadPost() {
      const params    = new URLSearchParams(window.location.search);
      const id        = params.get('id');
      const container = document.getElementById('post-container');

      if (!id) { container.innerHTML = '<p class="post-not-found">No post specified.</p>'; return; }

      try {
        const post = await getPostById(id);
        if (!post) throw new Error('not found');

        const date = post.date
          ? new Date(post.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
          : '';

        const backPage  = catPages[post.category] || 'index.html';
        const backLabel = catNames[post.category] || 'Back';
        const icon      = catIcons[post.category] ? `<img src="${catIcons[post.category]}" class="nav-icon" alt="">` : '';
        const isPoem    = post.category === 'poem';

        document.title = `${post.title} — LINESBYLIN`;

        let sections = [];
        if (Array.isArray(post.sections)) {
          sections = post.sections;
        } else if (typeof post.sections === 'string') {
          try { sections = JSON.parse(post.sections); } catch(e) { sections = []; }
        }

        const bodyHTML = sections.map(sec => renderSection(sec, isPoem)).join('');

        container.innerHTML = `
          <a href="${backPage}" class="back-link">← Back to ${backLabel}s</a>
          ${post.imageURL ? `<img class="post-hero" src="${post.imageURL}" alt="${post.title}">` : ''}
          <div class="post-meta">
            <span class="post-category-badge">${icon} ${catNames[post.category] || post.category}</span>
            ${date ? `<span class="post-date">${date}</span>` : ''}
          </div>
          <h1 class="post-title">${post.title}</h1>
          <hr class="post-divider">
          <div class="post-body ${isPoem ? 'poem-style' : ''}">
            ${bodyHTML || '<p>No content yet.</p>'}
          </div>
        `;

      } catch (e) {
        container.innerHTML = `<a href="index.html" class="back-link">← Home</a><p class="post-not-found">Post not found.</p>`;
      }
    }

    function renderSection(sec, isPoem) {
      switch (sec.type) {
        case 'title':
          return `<h2 class="section-title-block">${sec.content || ''}</h2>`;
        case 'text':
          return `<div class="section-text">${sec.content || ''}</div>`;
        case 'paragraph':
          if (isPoem) return `<div class="poem-stanza">${sec.content || ''}</div>`;
          return `<div class="section-paragraph">${sec.content || ''}</div>`;
        case 'quote':
          return `<blockquote class="section-quote">${sec.content || ''}</blockquote>`;
        case 'image':
          return sec.content ? `<img class="section-img" src="${sec.content}" alt="">` : '';
        case 'divider':
          return `<hr class="section-divider-line">`;
        default:
          return `<div>${sec.content || ''}</div>`;
      }
    }

    document.addEventListener('DOMContentLoaded', loadPost);
  </script>
</body>
</html>
